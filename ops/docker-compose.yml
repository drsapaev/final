version: "3.9"

name: ${COMPOSE_PROJECT_NAME:-clinic-local}

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_DB: ${POSTGRES_DB:-clinicdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ..
      dockerfile: ops/backend.Dockerfile
      target: runtime
    container_name: clinic-backend
    restart: unless-stopped
    environment:
      # Local dev core. Override these in your shell or .env only when needed.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clinicdb}
      APP_NAME: ${APP_NAME:-Clinic Queue Manager}
      APP_VERSION: ${APP_VERSION:-0.9.0-local}
      ENV: ${ENV:-dev}
      # Auth
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required (set it in .env)}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # CORS
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-0}
      CORS_DISABLE: ${CORS_DISABLE:-0}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Printer (optional)
      PRINTER_TYPE: ${PRINTER_TYPE:-none}
      PRINTER_NET_HOST: ${PRINTER_NET_HOST:-}
      PRINTER_NET_PORT: ${PRINTER_NET_PORT:-9100}
      PRINTER_USB_VID: ${PRINTER_USB_VID:-}
      PRINTER_USB_PID: ${PRINTER_USB_PID:-}
      # Keep bootstrap admin disabled by default so /setup owns the first admin.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required (set it in .env)}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.local}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Local Admin}
      ADMIN_RESET_PASSWORD: ${ADMIN_RESET_PASSWORD:-0}
      ENSURE_ADMIN: ${ENSURE_ADMIN:-0}
      # App bind
      HOST: 0.0.0.0
      PORT: 18000
      RELOAD: ${RELOAD:-1}
      WORKERS: ${WORKERS:-1}
      RUN_ALEMBIC_ON_START: ${RUN_ALEMBIC_ON_START:-1}
      # Redis (for WebSocket pubsub + arq task queue)
      ARQ_REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Sentry (DSN is public send-only key — safe to commit; ENV/TRACES_RATE
      # can be overridden in .env file)
      SENTRY_DSN: ${SENTRY_DSN:-https://65b5195082de2f0522c27dd6695536b7@o4511673323749376.ingest.us.sentry.io/4511673347670016}
      SENTRY_ENV: ${SENTRY_ENV:-${ENV:-dev}}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
      APP_VERSION: ${APP_VERSION:-0.9.0}
      # Licensing / Activation
      REQUIRE_LICENSE: ${REQUIRE_LICENSE:-0}
      LICENSE_MODE: ${LICENSE_MODE:-activation}
      LICENSE_ALLOW_HEALTH: ${LICENSE_ALLOW_HEALTH:-1}
    volumes:
      - ../backend:/app:rw
      - backend_data:/data
    working_dir: /app
    command: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "${BACKEND_BIND:-0.0.0.0}:${BACKEND_PORT:-18000}:18000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18000/api/v1/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 25s

  frontend:
    build:
      context: ..
      dockerfile: ops/frontend.Dockerfile
    container_name: clinic-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000}
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:18000/api/v1}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:18000}
      VITE_WS_PROXY_TARGET: ${VITE_WS_PROXY_TARGET:-ws://backend:18000}
    volumes:
      - ../frontend:/app:rw
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Redis — pub/sub for WebSocket fanout + arq task queue broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: clinic-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD is required (set it in .env)}"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6

  # ---------------------------------------------------------------------------
  # arq worker — background jobs (visit reminders, data retention, reports)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: ops/backend.Dockerfile
      target: runtime
    container_name: clinic-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clinicdb}
      ARQ_REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      APP_NAME: ${APP_NAME:-Clinic Queue Manager}
      APP_VERSION: ${APP_VERSION:-0.9.0-local}
      ENV: ${ENV:-dev}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required (set it in .env)}
      TIMEZONE: ${TIMEZONE:-Asia/Tashkent}
      # Sentry (DSN is public send-only key — safe to commit)
      SENTRY_DSN: ${SENTRY_DSN:-https://65b5195082de2f0522c27dd6695536b7@o4511673323749376.ingest.us.sentry.io/4511673347670016}
      SENTRY_ENV: ${SENTRY_ENV:-${ENV:-dev}}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
    volumes:
      - ../backend:/app:rw
      - backend_data:/data
    working_dir: /app
    # arq WorkerSettings is defined in backend/app/tasks/worker.py
    command: ["arq", "app.tasks.worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  backend_data:
  frontend_node_modules:
  postgres_data:
  redis_data:
