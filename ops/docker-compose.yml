version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-clinicdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: ops/backend.Dockerfile
      target: runtime
    container_name: clinic-backend
    restart: unless-stopped
    environment:
      # Core
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set to a PostgreSQL connection string}
      APP_NAME: ${APP_NAME:-Clinic Queue Manager}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENV: ${ENV:-production}
      # Auth
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      # CORS
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-0}
      CORS_DISABLE: ${CORS_DISABLE:-0}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:18080,http://127.0.0.1:18080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # Printer (optional)
      PRINTER_TYPE: ${PRINTER_TYPE:-none}
      PRINTER_NET_HOST: ${PRINTER_NET_HOST:-}
      PRINTER_NET_PORT: ${PRINTER_NET_PORT:-9100}
      PRINTER_USB_VID: ${PRINTER_USB_VID:-}
      PRINTER_USB_PID: ${PRINTER_USB_PID:-}
      # Admin bootstrap
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME must be set}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:?ADMIN_FULL_NAME must be set}
      ADMIN_RESET_PASSWORD: ${ADMIN_RESET_PASSWORD:-0}
      ENSURE_ADMIN: ${ENSURE_ADMIN:-1}
      # App bind
      HOST: 0.0.0.0
      PORT: 8000
      RELOAD: ${RELOAD:-0}
      WORKERS: ${WORKERS:-1}
      RUN_ALEMBIC_ON_START: ${RUN_ALEMBIC_ON_START:-1}
      # Licensing / Activation
      REQUIRE_LICENSE: ${REQUIRE_LICENSE:-1}
      LICENSE_MODE: ${LICENSE_MODE:-activation}
      LICENSE_ALLOW_HEALTH: ${LICENSE_ALLOW_HEALTH:-1}
    volumes:
      - ./backend:/app:rw
      - backend_data:/data
    working_dir: /app
    command: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ops/frontend.Dockerfile
    container_name: clinic-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000}
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:18000/api/v1}
    volumes:
      - ./frontend:/app:rw
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
  postgres_data:
