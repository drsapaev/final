[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
markers =
    unit: Р В Р’В®Р В Р вҖҰР В РЎвҖҳР РҺРІРӮСҷ Р РҺРІРӮСҷР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„–
    integration: Р В Р’ВҳР В Р вҖҰР РҺРІРӮСҷР В Р’ВөР В РЎвҖ“Р РҺР вҖҡР В Р’В°Р РҺРІРӮВ Р В РЎвҖҳР В РЎвҖўР В Р вҖҰР В Р вҖҰР РҺРІРӮв„–Р В Р’Вө Р РҺРІРӮСҷР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„–
    e2e: Р В Р РӢР В РЎвҖқР В Р вҖ Р В РЎвҖўР В Р’В·Р В Р вҖҰР РҺРІРӮв„–Р В Р’Вө (E2E) Р РҺРІРӮСҷР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„–
    slow: Р В РЎСҷР В Р’ВөР В РўвҖҳР В Р’В»Р В Р’ВөР В Р вҖҰР В Р вҖҰР РҺРІРӮв„–Р В Р’Вө Р РҺРІРӮСҷР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„–
    security: Р В РЎСӣР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„– Р В Р’ВұР В Р’ВөР В Р’В·Р В РЎвҖўР В РЎвҖ”Р В Р’В°Р РҺР С“Р В Р вҖҰР В РЎвҖўР РҺР С“Р РҺРІРӮСҷР В РЎвҖҳ
    migration: Р В РЎСӣР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„– Р В РЎВҳР В РЎвҖҳР В РЎвҖ“Р РҺР вҖҡР В Р’В°Р РҺРІРӮВ Р В РЎвҖҳР В РІвҖһвҖ“
    confirmation: Р В РЎСӣР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„– Р В РЎвҖ”Р В РЎвҖўР В РўвҖҳР РҺРІРӮСҷР В Р вҖ Р В Р’ВөР РҺР вҖҡР В Р’В¶Р В РўвҖҳР В Р’ВөР В Р вҖҰР В РЎвҖҳР РҺР РҸ Р В Р вҖ Р В РЎвҖҳР В Р’В·Р В РЎвҖҳР РҺРІРӮСҷР В РЎвҖўР В Р вҖ 
    queue: Р В РЎСӣР В Р’ВөР РҺР С“Р РҺРІРӮСҷР РҺРІРӮв„– Р В РЎвҖўР РҺРІРӮРҺР В Р’ВөР РҺР вҖҡР В Р’ВөР В РўвҖҳР В Р’ВөР В РІвҖһвҖ“
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
