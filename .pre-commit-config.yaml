repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=300']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
        exclude: ^(\.agents/skills/|frontend/public/|backend/app/services/ai/.*\.json$)
      - id: trailing-whitespace
        exclude: ^(\.agents/skills/|frontend/public/)
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # ---------------------------------------------------------------------------
  # Secret scanning (gitleaks)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: 🔑 Scan for leaked secrets (gitleaks)

  # ---------------------------------------------------------------------------
  # Python — ruff (replaces flake8 + isort + pyupgrade), black (formatting)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        files: ^backend/

  # ---------------------------------------------------------------------------
  # Frontend — eslint
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: 🧹 ESLint (frontend)
        # Strip the 'frontend/' prefix that pre-commit adds, then run eslint
        # from inside frontend/ with the relative path. npx --no-install
        # fails fast if node_modules is missing (better than silent skip).
        entry: bash -c 'cd frontend && npx --no-install eslint --fix "$@"' --
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true
        types: [file]

  # ---------------------------------------------------------------------------
  # Local project-specific guards
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: no-db-files
        name: Block database & dumps
        entry: Database and SQL dump files are not allowed in commits.
        language: fail
        files: \.(db|sqlite|dump|sql)$

      - id: no-env-files
        name: Block committed .env files
        entry: Real .env files are not allowed. Use .env.example instead.
        language: fail
        files: \.env$
        exclude: \.env\.example$|\.env\.sample$

      - id: no-stray-root-tests
        name: Block test_*.py at repo root
        entry: Test files at repo root are not collected by pytest. Move to backend/tests/ or scripts/legacy_tests/.
        language: fail
        files: ^test_.*\.py$

      - id: no-stray-backend-root-scripts
        name: Block stray .py scripts at backend/ root
        entry: Scripts at backend/ root are not part of the app. Move to backend/app/scripts/ (production) or scripts/legacy_scripts/backend/ (one-off dev scripts).
        language: fail
        files: ^backend/[^/]+\.py$
        exclude: ^backend/(run\.py|wsgi\.py|asgi\.py|manage\.py)$
