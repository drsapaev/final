name: 🛡️ CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**/*.py'
      - 'frontend/src/**/*.{js,jsx,ts,tsx}'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**/*.py'
      - 'frontend/src/**/*.{js,jsx,ts,tsx}'
  schedule:
    - cron: '0 5 * * 1'  # Weekly Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-python:
    name: 🐍 Analyze Python (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Install backend deps (for CodeQL to resolve imports)
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

  analyze-javascript:
    name: 🟨 Analyze JavaScript (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Install frontend deps (for CodeQL to resolve imports)
        run: |
          cd frontend
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
