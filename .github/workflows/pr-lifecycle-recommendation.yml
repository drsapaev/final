name: PR Lifecycle Recommendation

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  recommend:
    name: Recommend PR lifecycle state
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout trusted base automation
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Collect PR files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr view "$PR_NUMBER" --repo "$REPO" --json files > pr-files.json

      - name: Build lifecycle recommendation
        run: |
          python scripts/recommend_pr_lifecycle.py \
            --event-file "$GITHUB_EVENT_PATH" \
            --files-json pr-files.json \
            --output-comment pr-lifecycle-comment.md \
            --output-labels pr-lifecycle-labels.txt \
            --output-known-labels pr-lifecycle-known-labels.txt

      - name: Apply lifecycle labels and recommendation comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-lifecycle-recommendation -->";
            const body = fs.readFileSync("pr-lifecycle-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const readLines = (path) =>
              fs.readFileSync(path, "utf8")
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean);

            const desiredLifecycleLabels = new Set(readLines("pr-lifecycle-labels.txt"));
            const knownLifecycleLabels = new Set(readLines("pr-lifecycle-known-labels.txt"));
            const issue = await github.rest.issues.get({ owner, repo, issue_number });
            const currentLabels = issue.data.labels
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const nextLabels = [
              ...currentLabels.filter((label) => !knownLifecycleLabels.has(label)),
              ...desiredLifecycleLabels,
            ];
            const nextLabelSet = new Set(nextLabels);
            const currentLabelSet = new Set(currentLabels);
            const labelsChanged =
              nextLabelSet.size !== currentLabelSet.size ||
              [...nextLabelSet].some((label) => !currentLabelSet.has(label));

            if (labelsChanged) {
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number,
                labels: [...nextLabelSet],
              });
            } else {
              core.info("Lifecycle labels are already up to date.");
            }

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const previous = comments.find((comment) =>
                comment.user.type === "Bot" && comment.body && comment.body.includes(marker)
              );
              if (previous) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: previous.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning(`Skipping lifecycle recommendation comment: ${error.message}`);
                return;
              }
              throw error;
            }
