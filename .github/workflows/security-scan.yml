name: 🔒 Сканирование безопасности

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * *'  # Каждый день в 3:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}

jobs:
  security-scan:
    name: 🔒 Сканирование безопасности
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11.10'

    - name: 🔧 Настройка Python path
      run: |
        cd backend
        echo "PYTHONPATH=$GITHUB_WORKSPACE/backend" >> $GITHUB_ENV

    - name: 📦 Установка инструментов безопасности
      run: |
        cd backend
        pip install bandit safety pip-audit

    - name: 🔍 Сканирование зависимостей (safety) — блокирующее
      run: |
        cd backend
        # Safety exits non-zero on vulnerabilities. We fail CI on any finding.
        safety check --json --output safety-report.json
        # Always produce artifact even on failure (next step needs it)
      continue-on-error: false

    - name: 🔍 Сканирование зависимостей (pip-audit) — неблокирующее
      # pip-audit has many false positives for transitive deps; keep report-only.
      run: |
        cd backend
        pip-audit --format json --output pip-audit-report.json || true

    - name: 🔍 Сканирование кода (bandit) — блокирующее на MEDIUM+
      run: |
        cd backend
        # -ll = threshold MEDIUM and above (skips LOW-only findings).
        # Exit non-zero if any MEDIUM/HIGH issue found.
        bandit -r . -f json -o bandit-report.json -ll
      continue-on-error: false

    - name: 📤 Загрузка отчётов безопасности
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: security-reports
        path: |
          backend/safety-report.json
          backend/pip-audit-report.json
          backend/bandit-report.json
        retention-days: 14

    - name: 📊 Сводка по безопасности
      if: always()
      run: |
        echo "🔒 Анализ безопасности завершён"
        echo "📋 Отчёты загружены как артефакты"
        echo ""
        echo "=== Итоги ==="
        if [ -f backend/safety-report.json ]; then
          issues=$(python -c "import json;d=json.load(open('backend/safety-report.json'));print(len(d.get('vulnerabilities',[])))" 2>/dev/null || echo "?")
          echo "safety: $issues уязвимостей"
        fi
        if [ -f backend/bandit-report.json ]; then
          metrics=$(python -c "import json;d=json.load(open('backend/bandit-report.json'));m=d.get('metrics',{}).get('_totals',{});print(f\"HIGH={m.get('SEVERITY.HIGH',0)} MEDIUM={m.get('SEVERITY.MEDIUM',0)} LOW={m.get('SEVERITY.LOW',0)}\")" 2>/dev/null || echo "?")
          echo "bandit: $metrics"
        fi
