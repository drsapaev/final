name: 🔒 Сканирование безопасности

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * *'  # Каждый день в 3:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}

jobs:
  security-scan:
    name: 🔒 Сканирование безопасности
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11.10'

    - name: 🔧 Настройка Python path
      run: |
        cd backend
        echo "PYTHONPATH=$GITHUB_WORKSPACE/backend" >> $GITHUB_ENV

    - name: 📦 Установка инструментов безопасности
      run: |
        cd backend
        pip install bandit safety pip-audit

    - name: 🔍 Сканирование зависимостей (pip-audit) — блокирующее
      # V5: python-jose bumped to 3.4.0 (closed 5 CVEs), jinja2 bumped to 3.1.6
      # (closed 5 CVEs). pip-audit is now strict — fails CI on any CVE.
      # Switched from safety to pip-audit because safety CLI v3 has unstable
      # options across minor versions (--output-format vs --output vs --json).
      # pip-audit is maintained by PyPA and has stable CLI.
      run: |
        cd backend
        pip-audit --strict --format json --output pip-audit-report.json
      continue-on-error: false

    - name: 🔍 Сканирование зависимостей (safety) — report-only
      # Safety runs in parallel as report-only for cross-validation.
      run: |
        cd backend
        safety check --json --output safety-report.json || true

    - name: 🔍 Сканирование кода (bandit) — блокирующее на MEDIUM+
      # Bandit: -ll = MEDIUM+ threshold. All HIGH and MEDIUM findings
      # were fixed in V4 (PR with 53 nosec/fixes). Now blocking on
      # MEDIUM+ to prevent regressions.
      run: |
        cd backend
        bandit -r . -f json -o bandit-report.json -ll
      continue-on-error: false

    - name: 📤 Загрузка отчётов безопасности
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: security-reports
        path: |
          backend/safety-report.json
          backend/pip-audit-report.json
          backend/bandit-report.json
        retention-days: 14

    - name: 📊 Сводка по безопасности
      if: always()
      run: |
        echo "🔒 Анализ безопасности завершён"
        echo "📋 Отчёты загружены как артефакты"
        echo ""
        echo "=== Итоги ==="
        if [ -f backend/pip-audit-report.json ]; then
          issues=$(python -c "import json;d=json.load(open('backend/pip-audit-report.json'));print(len(d.get('dependencies',[])))" 2>/dev/null || echo "?")
          echo "pip-audit: $issues зависимостей с vulns (блокирует CI при >0)"
        fi
        if [ -f backend/safety-report.json ]; then
          issues=$(python -c "import json;d=json.load(open('backend/safety-report.json'));print(len(d.get('vulnerabilities',[])))" 2>/dev/null || echo "?")
          echo "safety: $issues уязвимостей (report-only)"
        fi
        if [ -f backend/bandit-report.json ]; then
          metrics=$(python -c "import json;d=json.load(open('backend/bandit-report.json'));m=d.get('metrics',{}).get('_totals',{});print(f\"HIGH={m.get('SEVERITY.HIGH',0)} MEDIUM={m.get('SEVERITY.MEDIUM',0)} LOW={m.get('SEVERITY.LOW',0)}\")" 2>/dev/null || echo "?")
          echo "bandit: $metrics (HIGH+MEDIUM блокируют; LOW report-only)"
        fi
        echo ""
        echo "✅ Security posture: strict (pip-audit CVEs block CI, bandit MEDIUM+ blocks CI)."
