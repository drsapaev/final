              'app.api.v1.endpoints.visits',
              'app.api.v1.endpoints.services',
              'app.api.v1.endpoints.appointments',
          ]
          failed_modules = []
          for module in modules_to_test:
              try:
                  __import__(module)
                  print(f'✅ {module} OK')
              except Exception as e:
                  print(f'❌ {module} FAILED: {e}')
                  import traceback
                  traceback.print_exc()
                  failed_modules.append(module)
          if failed_modules:
              print(f'❌ Failed modules: {failed_modules}')
              sys.exit(1)
          " 2>&1 || exit 1
        fi
        
        echo "Step 2: Importing app.main module..."
        if ! python -c "
        import os
        import sys
        import traceback
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinic_ci_only_password@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        print('Debug: Testing app.main import...')
        try:
            import app.main
            print('✅ app.main module imported')
        except Exception as e:
            print(f'❌ Failed to import app.main: {e}')
            print('Full traceback:')
            traceback.print_exc()
            sys.exit(1)
        " 2>&1; then
          echo "❌ Не удалось импортировать app.main"
          exit 1
        fi

        echo "Step 3: Importing app from app.main..."
        if ! python -c "
        import os
        import sys
        import traceback
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinic_ci_only_password@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        print('Debug: Testing app from app.main import...')
        try:
            from app.main import app
            print('✅ App импортирован успешно')
        except Exception as e:
            print(f'❌ Failed to import app from app.main: {e}')
            print('Full traceback:')
            traceback.print_exc()
            sys.exit(1)
        " 2>&1; then
          echo "❌ Не удалось импортировать app из app.main"
          exit 1
        fi
        
        echo "✅ Все импорты успешны"
        echo "🚀 Запускаем сервер..."
        nohup uvicorn app.main:app --host 127.0.0.1 --port 18000 > server.log 2>&1 &
        SERVER_PID=$!
        echo $SERVER_PID > server.pid
        echo "⏳ Ожидаем запуска сервера (PID: $SERVER_PID)..."
        sleep 15
        
        # Проверяем, что процесс еще работает
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "❌ Сервер не запустился (процесс завершился)"
          echo "📋 Логи сервера:"
          cat server.log || echo "Логи не доступны"
          exit 1
        fi
        
        echo "📋 Логи сервера после запуска:"
        head -50 server.log || echo "Логи не доступны"
        echo "🔍 Проверяем статус процесса:"
        ps aux | grep uvicorn | grep -v grep || echo "Процесс не найден"
        if [ -f server.pid ]; then
          echo "📝 PID файл существует: $(cat server.pid)"
        else
          echo "⚠️ PID файл не найден"
        fi
        
        # Проверяем доступность сервера
        echo "🔍 Проверяем доступность сервера..."
        for i in {1..5}; do
          if curl -f http://127.0.0.1:18000/api/v1/health > /dev/null 2>&1; then
            echo "✅ Сервер успешно запущен и отвечает на запросы"
            break
          else
            if [ $i -eq 5 ]; then
              echo "❌ Сервер не отвечает после 5 попыток"
              echo "📋 Последние 100 строк логов:"
              tail -100 server.log || echo "Логи не доступны"
              exit 1
            fi
            echo "⏳ Попытка $i/5: сервер еще не готов..."
            sleep 3
          fi
        done
    
    - name: 🧪 Интеграционные тесты
      run: |
        cd backend
        # Ждем запуска сервера
        echo "⏳ Ожидаем запуска сервера..."
        SERVER_READY=false
        for i in {1..30}; do
          if curl -s -f "http://127.0.0.1:18000/api/v1/health" > /dev/null 2>&1; then
            echo "✅ Сервер запущен и отвечает на запросы"
            SERVER_READY=true
            break
          fi
          echo "⏳ Попытка $i/30: сервер еще не готов..."
          if [ $i -eq 30 ]; then
            echo "❌ Сервер не запустился за 60 секунд"
            echo "📋 Последние 100 строк логов сервера:"
            tail -100 server.log || echo "Логи не доступны"
            echo "🔍 Проверяем процессы:"
            ps aux | grep uvicorn || echo "Процесс uvicorn не найден"
            if [ -f server.pid ]; then
              echo "📝 PID файл: $(cat server.pid)"
            fi
            exit 1
          fi
          sleep 2
        done
        
        if [ "$SERVER_READY" = false ]; then
          echo "❌ Сервер не готов к тестированию"
          exit 1
        fi
        
        # Запускаем интеграционные тесты для запущенного сервера
        echo "🧪 Запускаем интеграционные тесты..."
        pytest -q tests/integration/test_server_integration.py -rA || {
          echo "⚠️ Некоторые интеграционные тесты не прошли"
          echo "📊 Логи сервера (последние 100 строк):"
          tail -100 server.log || true
          exit 1
        }
    
    - name: 🛑 Остановка сервера
      if: always()
      run: |
        if [ -f backend/server.pid ]; then
          kill $(cat backend/server.pid) 2>/dev/null || true
        fi

  # --- Load Tests (Nightly/Manual) ---
  load-tests-nightly:
    name: ⚡ Load Tests (k6)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [security, integration]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinicdb
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic_ci_only_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://clinic:clinic_ci_only_password@localhost:5432/clinicdb
      CORS_DISABLE: '1'
      WS_DEV_ALLOW: '1'
      PYTHONIOENCODING: 'utf-8'
      PYTHONUTF8: '1'

    steps:
    - uses: actions/checkout@v7

    - name: 🐍 Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Install backend dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🗄️ Prepare database
      run: |
        cd backend
        python - <<'PY'
        import os
        import time
        from sqlalchemy import create_engine, text

        engine = create_engine(os.environ["DATABASE_URL"])
        for i in range(30):
            try:
                with engine.connect() as conn:
                    conn.execute(text("SELECT 1"))
                print("✅ Postgres ready")
                break
            except Exception as e:
                if i == 29:
                    raise
                print(f"Attempt {i + 1}/30: {e}")
                time.sleep(2)
        PY
        alembic upgrade head

    - name: 🚀 Start API for load test
      run: |
        set +e
        mkdir -p artifacts/load
        cd backend
        nohup uvicorn app.main:app --host 127.0.0.1 --port 18000 > load_server.log 2>&1 &
        echo $! > load_server.pid
        API_READY=0
        for i in {1..30}; do
          if curl -s -f "http://127.0.0.1:18000/api/v1/health" > /dev/null 2>&1; then
            echo "✅ API ready for load test"
            API_READY=1
            break
          fi
          sleep 2
        done
        echo "LOAD_API_READY=$API_READY" >> $GITHUB_ENV
        if [ "$API_READY" -ne 1 ]; then
          echo "::warning::API did not start for load test. k6 step will be marked as failed with fallback artifacts."
          tail -100 load_server.log || true
        fi
        exit 0

    - name: ⚡ Run k6 profile matrix
      run: |
        set +e
        mkdir -p artifacts/load
        python ops/scripts/run_load_profiles.py \
          --config ops/load/endpoint_profiles.json \
          --workspace "${{ github.workspace }}" \
          --artifacts-dir artifacts/load \
          --base-url http://127.0.0.1:18000 \
          --api-ready "${LOAD_API_READY:-0}"
        LOAD_EXIT=$?
        echo "LOAD_PROFILES_EXIT_CODE=$LOAD_EXIT" >> $GITHUB_ENV
        if [ ! -f artifacts/load/k6-summary.json ]; then
          echo "::warning::aggregate k6 summary is missing"
          echo "K6_SUMMARY_MISSING=1" >> $GITHUB_ENV
        else
          echo "K6_SUMMARY_MISSING=0" >> $GITHUB_ENV
        fi
        if [ ! -f artifacts/load/load-regression-report.md ]; then
          cat > artifacts/load/load-regression-report.md <<'MD'
        # Load Test Regression Report

        - Status: FAIL
        - Reason: aggregate load-regression-report.md missing.
        MD
        fi
        exit 0

    - name: 📤 Upload load artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: load-test-report
        path: |
          artifacts/load/k6-summary.json
          artifacts/load/load-regression-report.md
          artifacts/load/load-regression-report.json
          artifacts/load/profiles/**
        retention-days: 14
        if-no-files-found: warn

    - name: 🛑 Stop API
      if: always()
      run: |
        if [ -f backend/load_server.pid ]; then
          kill $(cat backend/load_server.pid) 2>/dev/null || true
        fi

    - name: 🚨 Enforce load gate
      run: |
        LOAD_EXIT=${LOAD_PROFILES_EXIT_CODE:-1}
        SUMMARY_MISSING=${K6_SUMMARY_MISSING:-1}

        if [ ! -f artifacts/load/load-regression-report.md ]; then
          cat > artifacts/load/load-regression-report.md <<'MD'
        # Load Test Regression Report

        - Status: FAIL
        - Reason: load-regression-report.md missing after checks.
        MD
          LOAD_EXIT=1
        fi

        echo "load_exit=$LOAD_EXIT, summary_missing=$SUMMARY_MISSING"
        if [ "$LOAD_EXIT" -ne 0 ] || [ "$SUMMARY_MISSING" -ne 0 ]; then
          echo "::error::Load gate failed."
          exit 1
        fi

  # --- DAST (Nightly) ---
  dast-zap-nightly:
    name: 🛡️ DAST ZAP (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinicdb
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic_ci_only_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://clinic:clinic_ci_only_password@localhost:5432/clinicdb
      CORS_DISABLE: '1'
      WS_DEV_ALLOW: '1'

    steps:
    - uses: actions/checkout@v7

    - name: 🐍 Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Install backend dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🗄️ Prepare database
      run: |
        cd backend
        python - <<'PY'
        import os
        import time
        from sqlalchemy import create_engine, text

        engine = create_engine(os.environ["DATABASE_URL"])
        for i in range(30):
            try:
                with engine.connect() as conn:
                    conn.execute(text("SELECT 1"))
                print("✅ Postgres ready")
                break
            except Exception as e:
                if i == 29:
                    raise
                print(f"Attempt {i + 1}/30: {e}")
                time.sleep(2)
        PY
        alembic upgrade head

    - name: 🚀 Start API for DAST
      run: |
        cd backend
        nohup uvicorn app.main:app --host 127.0.0.1 --port 18000 > zap_server.log 2>&1 &
        echo $! > zap_server.pid
        for i in {1..30}; do
          if curl -s -f "http://127.0.0.1:18000/api/v1/health" > /dev/null 2>&1; then
            echo "✅ API is ready for ZAP scan"
            exit 0
          fi
          sleep 2
        done
        echo "❌ API did not start"
        tail -100 zap_server.log || true
        exit 1

    - name: 🔎 Run ZAP baseline scan
      run: |
        mkdir -p zap-report
        chmod -R a+rwx zap-report || true
        set -o pipefail
        docker run --rm --network=host \
          --user root \
          -v ${{ github.workspace }}/zap-report:/zap/wrk \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t http://127.0.0.1:18000 \
          -J zap-report.json \
          -r zap-report.html \
          -w zap-warnings.md \
          -m 5 \
          -I | tee zap-report/zap-baseline.log
        ls -la zap-report

    - name: 🚦 Enforce DAST policy
      run: |
        python - <<'PY'
        import json
        import re
        from pathlib import Path

        report_path = Path("zap-report/zap-report.json")
        warnings_path = Path("zap-report/zap-warnings.md")
        baseline_log_path = Path("zap-report/zap-baseline.log")

        def parse_fail_counts(text: str):
          match = re.search(r"FAIL-NEW:\s*(\d+)\s+FAIL-INPROG:\s*(\d+)", text)
          if not match:
            return None
          return int(match.group(1)), int(match.group(2))

        if report_path.exists():
          report = json.loads(report_path.read_text(encoding="utf-8"))
          high = 0
          medium = 0
          for site in report.get("site", []):
            for alert in site.get("alerts", []):
              risk = str(alert.get("riskcode", "0"))
              if risk == "3":
                high += 1
              elif risk == "2":
                medium += 1
          print(f"ZAP alerts (json): high={high}, medium={medium}")
          if high > 0 or medium > 0:
            raise SystemExit(1)
          raise SystemExit(0)

        for fallback_path in (warnings_path, baseline_log_path):
          if not fallback_path.exists():
            continue
          summary = parse_fail_counts(fallback_path.read_text(encoding="utf-8"))
          if summary is None:
            continue
          fail_new, fail_inprog = summary
          print(
            f"ZAP summary ({fallback_path.name}): "
            f"fail_new={fail_new}, fail_inprog={fail_inprog}"
          )
          if fail_new > 0 or fail_inprog > 0:
            raise SystemExit(1)
          raise SystemExit(0)

        raise SystemExit(
          "ZAP artifacts missing usable summary: zap-report.json, zap-warnings.md, zap-baseline.log"
        )
        PY

    - name: 📤 Upload ZAP artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: zap-nightly-report
        path: zap-report/
        retention-days: 14
        if-no-files-found: warn

    - name: 🛑 Stop API
      if: always()
      run: |
        if [ -f backend/zap_server.pid ]; then
          kill $(cat backend/zap_server.pid) 2>/dev/null || true
        fi

