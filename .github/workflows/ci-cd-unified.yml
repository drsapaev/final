            print('🔧 Настройка окружения завершена')
            print(f'📋 DATABASE_URL: {os.environ.get(\"DATABASE_URL\")}')
            
            # Импортируем приложение
            print('📦 Импортируем app.main...')
            from app.main import app
            import json
            
            print('✅ Импорт app.main успешен')
            
            # Генерируем схему
            print('📝 Генерируем OpenAPI схему...')
            openapi_schema = app.openapi()
            
            # Сохраняем схему
            with open('openapi.json', 'w', encoding='utf-8') as f:
                json.dump(openapi_schema, f, indent=2, ensure_ascii=False)
            
            print('✅ OpenAPI схема создана успешно')
            print(f'📊 Размер файла: {os.path.getsize(\"openapi.json\")} байт')
            
        except Exception as e:
            print(f'❌ Ошибка генерации документации: {e}')
            print('📋 Детали ошибки:')
            traceback.print_exc()

            if os.environ.get('DOCS_REQUIRED', 'false').lower() == 'true':
                print('❌ OpenAPI generation is required for this run; failing instead of using fallback schema.')
                sys.exit(1)
            
            # Создаем минимальную схему в случае ошибки
            print('⚠️ Создаем минимальную схему...')
            minimal_schema = {
                'openapi': '3.0.0',
                'info': {
                    'title': 'Clinic API', 
                    'version': '1.0.0',
                    'description': 'API documentation - generation failed'
                },
                'paths': {},
                'components': {'schemas': {}}
            }
            import json
            with open('openapi.json', 'w', encoding='utf-8') as f:
                json.dump(minimal_schema, f, indent=2, ensure_ascii=False)
            print('✅ Минимальная OpenAPI схема создана')
        "
        
        # Проверяем, что файл создался
        if [ -f "openapi.json" ]; then
          echo "✅ Файл openapi.json создан успешно"
          echo "📊 Размер файла: $(wc -c < openapi.json) байт"
        else
          echo "❌ Файл openapi.json не создан"
          exit 1
        fi
    
    - name: 📤 Загрузка документации
      uses: actions/upload-artifact@v7
      with:
        name: api-docs
        path: backend/openapi.json
        retention-days: 14

  telegram-miniapp-release-gate:
    name: Telegram Mini App Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [ci-scope]
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (
          github.event_name == 'pull_request' &&
          (
            needs.ci-scope.outputs.telegram_release_gate_required == 'true' ||
            needs.ci-scope.outputs.workflow_changed == 'true'
          )
        )
      ) &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinicdb
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic_ci_only_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://clinic:clinic_ci_only_password@localhost:5432/clinicdb
      DATABASE_URL_TEST: postgresql+psycopg://clinic:clinic_ci_only_password@localhost:5432/clinicdb
      CORS_DISABLE: '1'
      WS_DEV_ALLOW: '1'
      PYTHONIOENCODING: 'utf-8'
      PYTHONUTF8: '1'

    steps:
    - uses: actions/checkout@v7

    - name: рџђЌ Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: рџ“¦ Install backend dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-deadfixtures httpx

    - name: рџ“¦ Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: рџ“¦ Install frontend dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps

    - name: рџ§Є Telegram Mini App browser QA artifacts
      run: |
        cd frontend
        npx playwright install --with-deps chromium
        # Spec migrated .spec.js -> .spec.ts in PR #2433 (TS migration).
        npx playwright test e2e/telegram-miniapp-release-gate.spec.ts --project=chromium --workers=1 --reporter=line

    - name: рџ§® Telegram Mini App release score
      shell: pwsh
      run: ./scripts/telegram_miniapp_release_gate_score.ps1

    - name: рџ“¤ Upload Telegram Mini App release-gate artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: telegram-miniapp-release-gate
        path: |
          docs/release_gates/telegram_mini_app_release_gate_score.json
          output/playwright/telegram-miniapp-release-gate/
        retention-days: 14
        if-no-files-found: warn

  pr-required-gate:
    name: PR Required Gate
    runs-on: ubuntu-latest
    needs:
      - ci-scope
      - metadata-checks
      - code-quality
      - frontend-lint
      - frontend-unit-tests
      - frontend-build
      - frontend-e2e
      - backend-tests
      - architecture-boundary
      - frontend-backend-parity
      - docs
      - telegram-miniapp-release-gate
    if: always() && github.event_name == 'pull_request'

    steps:
    - name: Summarize path-aware PR gates
      shell: bash
      env:
        METADATA_RESULT: ${{ needs.metadata-checks.result }}
        CODE_QUALITY_RESULT: ${{ needs.code-quality.result }}
        FRONTEND_LINT_RESULT: ${{ needs.frontend-lint.result }}
        FRONTEND_UNIT_RESULT: ${{ needs.frontend-unit-tests.result }}
        FRONTEND_BUILD_RESULT: ${{ needs.frontend-build.result }}
        FRONTEND_E2E_RESULT: ${{ needs.frontend-e2e.result }}
        BACKEND_RESULT: ${{ needs.backend-tests.result }}
        ARCHITECTURE_RESULT: ${{ needs.architecture-boundary.result }}
        PARITY_RESULT: ${{ needs.frontend-backend-parity.result }}
        DOCS_RESULT: ${{ needs.docs.result }}
        TELEGRAM_RELEASE_GATE_RESULT: ${{ needs.telegram-miniapp-release-gate.result }}
        BACKEND_REQUIRED: ${{ needs.ci-scope.outputs.backend_required }}
        FRONTEND_REQUIRED: ${{ needs.ci-scope.outputs.frontend_required }}
        FRONTEND_E2E_REQUIRED: ${{ needs.ci-scope.outputs.frontend_e2e_required }}
        METADATA_REQUIRED: ${{ needs.ci-scope.outputs.metadata_required }}
        ARCHITECTURE_REQUIRED: ${{ needs.ci-scope.outputs.architecture_required }}
        PARITY_REQUIRED: ${{ needs.ci-scope.outputs.parity_required }}
        DOCS_REQUIRED: ${{ needs.ci-scope.outputs.docs_required }}
        TELEGRAM_RELEASE_GATE_REQUIRED: ${{ needs.ci-scope.outputs.telegram_release_gate_required }}
        WORKFLOW_CHANGED: ${{ needs.ci-scope.outputs.workflow_changed }}
      run: |
        set -euo pipefail

        CODE_QUALITY_REQUIRED="$BACKEND_REQUIRED"
        BACKEND_TESTS_REQUIRED="$BACKEND_REQUIRED"
        FRONTEND_CHECKS_REQUIRED="$FRONTEND_REQUIRED"
        TELEGRAM_GATE_REQUIRED="$TELEGRAM_RELEASE_GATE_REQUIRED"
        if [ "$WORKFLOW_CHANGED" = "true" ]; then
          CODE_QUALITY_REQUIRED="true"
          BACKEND_TESTS_REQUIRED="true"
          FRONTEND_CHECKS_REQUIRED="true"
          TELEGRAM_GATE_REQUIRED="true"
        fi

        echo "## PR Required Gate" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| gate | required | result |" >> "$GITHUB_STEP_SUMMARY"
        echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"

        fail=0
        check_result() {
          local gate="$1"
          local required="$2"
          local result="$3"
          echo "| ${gate} | ${required} | ${result} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$required" = "true" ]; then
            if [ "$result" != "success" ]; then
              echo "::error title=${gate} required::${gate} is required but result is ${result}"
              fail=1
            fi
            return
          fi

          case "$result" in
            failure|cancelled)
              echo "::error title=${gate} failed::${gate} is optional but result is ${result}"
              fail=1
              ;;
          esac
        }

        check_result "metadata" "$METADATA_REQUIRED" "$METADATA_RESULT"
        check_result "code-quality" "$CODE_QUALITY_REQUIRED" "$CODE_QUALITY_RESULT"
        check_result "frontend-lint" "$FRONTEND_CHECKS_REQUIRED" "$FRONTEND_LINT_RESULT"
        check_result "frontend-unit-tests" "$FRONTEND_CHECKS_REQUIRED" "$FRONTEND_UNIT_RESULT"
        check_result "frontend-build" "$FRONTEND_CHECKS_REQUIRED" "$FRONTEND_BUILD_RESULT"
        check_result "frontend-e2e" "$FRONTEND_E2E_REQUIRED" "$FRONTEND_E2E_RESULT"
        check_result "backend" "$BACKEND_TESTS_REQUIRED" "$BACKEND_RESULT"
        check_result "architecture" "$ARCHITECTURE_REQUIRED" "$ARCHITECTURE_RESULT"
        check_result "parity" "$PARITY_REQUIRED" "$PARITY_RESULT"
        check_result "docs" "$DOCS_REQUIRED" "$DOCS_RESULT"
        check_result "telegram-miniapp-release-gate" "$TELEGRAM_GATE_REQUIRED" "$TELEGRAM_RELEASE_GATE_RESULT"

        if [ "$fail" -ne 0 ]; then
          exit 1
        fi

        echo "Path-aware PR gates passed or were intentionally skipped."

  # --- Staging readiness report (no live deploy) ---
  deploy-staging:
    name: Staging readiness report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker, security, docs, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Staging readiness summary
      run: |
        echo "🚀 Staging readiness report (no live deployment)"
        echo "✅ Все проверки пройдены"
        echo "📦 Docker образы собраны"
        echo "🔒 Security сканирование завершено"
        echo "🔗 Интеграционные тесты пройдены"

  # --- Production readiness report (no live deploy) ---
  deploy-production:
    name: Production readiness report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker, security, docs, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Production readiness summary
      run: |
        echo "🌟 Production readiness report (no live deployment)"
        echo "✅ Все проверки пройдены"
        echo "📦 Docker образы собраны"
        echo "🔒 Security сканирование завершено"
        echo "🔗 Интеграционные тесты пройдены"
        echo "📚 Документация обновлена"

  # --- Уведомления ---
  notifications:
    name: 📧 Уведомления
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: 📧 Отправка уведомлений
      run: |
        if [ "${{ needs.deploy-staging.result }}" == "success" ] || [ "${{ needs.deploy-production.result }}" == "success" ]; then
          echo "✅ Развертывание успешно завершено"
          echo "📧 Уведомления отправлены"
        else
          echo "❌ Развертывание не выполнено"
        fi

