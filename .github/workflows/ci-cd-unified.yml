name: 🏥 CI/CD Pipeline - Клиника (Unified)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Ежедневно в 2:00
  workflow_dispatch:  # Ручной запуск

env:
  PYTHON_VERSION: '3.11.10'
  NODE_VERSION: '20'
  DATABASE_URL: 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
  CORS_DISABLE: '1'
  WS_DEV_ALLOW: '1'

jobs:
  # --- Проверка качества кода ---
  code-quality:
    name: 🔍 Качество кода
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Установка зависимостей
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort flake8 ruff vulture bandit mypy radon pydocstyle pylint
    
    - name: 🔍 Проверка конфигурации
      run: |
        cd backend
        echo "🔍 Проверяем конфигурационные файлы..."
        if [ ! -f "pyproject.toml" ]; then
          echo "❌ pyproject.toml не найден"
          exit 1
        fi
        echo "✅ pyproject.toml найден"
        echo "📁 Структура проекта:"
        ls -la app/ | head -10 || echo "⚠️ Директория app не найдена"
    
    - name: 🎨 Проверка форматирования кода
      run: |
        cd backend
        set +e  # Не выходить при ошибках, обрабатываем их вручную
        
        echo "🎨 Проверяем black форматирование (только app/ и tests/)..."
        BLACK_ERRORS=0
        
        # Форматируем только основные директории
        for dir in app tests; do
          if [ -d "$dir" ]; then
            echo "  Проверяем $dir/..."
            if ! black "$dir" --check --diff 2>&1 | tee /tmp/black_${dir}.log; then
              echo "⚠️ $dir/ требует форматирования"
              BLACK_ERRORS=$((BLACK_ERRORS + 1))
            fi
          fi
        done
        
        if [ $BLACK_ERRORS -gt 0 ]; then
          echo "⚠️ Найдено $BLACK_ERRORS директорий, требующих форматирования"
          echo "ℹ️ Не блокируем pipeline на этапе миграции legacy-форматирования"
          echo "Рекомендация: black app/ tests/"
        else
          echo "✅ Black форматирование OK"
        fi
        
        echo "📦 Проверяем isort сортировку импортов..."
        ISORT_ERRORS=0
        
        for dir in app tests; do
          if [ -d "$dir" ]; then
            echo "  Проверяем $dir/..."
            if ! isort "$dir" --check-only --diff 2>&1 | tee /tmp/isort_${dir}.log; then
              echo "⚠️ $dir/ требует сортировки импортов"
              ISORT_ERRORS=$((ISORT_ERRORS + 1))
            fi
          fi
        done
        
        if [ $ISORT_ERRORS -gt 0 ]; then
          echo "⚠️ Найдено $ISORT_ERRORS директорий, требующих сортировки импортов"
          echo "ℹ️ Не блокируем pipeline на этапе миграции legacy-импортов"
          echo "Рекомендация: isort app/ tests/"
        else
          echo "✅ Isort сортировка OK"
        fi
    
    - name: 🔍 Линтинг и статический анализ
      run: |
        cd backend
        set +e  # Не выходить при ошибках, собираем все ошибки
        mkdir -p quality-reports
        
        echo "🔍 Собираем ВСЕ ошибки линтинга для полного отчета..."
        echo "Этот шаг блокирует pipeline при наличии ошибок"
        
        # Ruff - собираем все ошибки
        echo "🔍 Ruff - быстрый линтер (только app/ и tests/)..."
        RUFF_ERRORS=0
        RUFF_TOTAL=0
        
        for dir in app tests; do
          if [ -d "$dir" ]; then
            echo "  Проверяем $dir/..."
            ruff check "$dir" --output-format=concise > quality-reports/ruff_${dir}.txt 2>&1
            RUFF_EXIT=$?
            if [ $RUFF_EXIT -ne 0 ]; then
              ERROR_COUNT=$(grep -c "^" quality-reports/ruff_${dir}.txt || echo "0")
              RUFF_TOTAL=$((RUFF_TOTAL + ERROR_COUNT))
              RUFF_ERRORS=$((RUFF_ERRORS + 1))
              echo "  ⚠️ Найдено ошибок в $dir/: $ERROR_COUNT"
            else
              echo "  ✅ $dir/ OK"
            fi
          fi
        done
        
        # Flake8 - собираем критические ошибки
        echo "🔍 Flake8 - критические ошибки (только app/)..."
        FLAKE8_ERRORS=0
        if [ -d "app" ]; then
          flake8 app --select=E9,F63,F7,F82 --show-source --statistics > quality-reports/flake8.txt 2>&1
          FLAKE8_EXIT=$?
          if [ $FLAKE8_EXIT -ne 0 ]; then
            ERROR_COUNT=$(grep -c "^" quality-reports/flake8.txt || echo "0")
            FLAKE8_ERRORS=$ERROR_COUNT
            echo "  ⚠️ Найдено критических ошибок: $ERROR_COUNT"
          else
            echo "  ✅ Flake8 OK"
          fi
        fi
        
        # MyPy - собираем ошибки типов
        echo "🔍 MyPy - проверка типов (только app/)..."
        MYPY_ERRORS=0
        if [ -d "app" ]; then
          mypy app --ignore-missing-imports --show-error-codes > quality-reports/mypy.txt 2>&1
          MYPY_EXIT=$?
          if [ $MYPY_EXIT -ne 0 ]; then
            ERROR_COUNT=$(grep -c "error:" quality-reports/mypy.txt || echo "0")
            MYPY_ERRORS=$ERROR_COUNT
            echo "  ⚠️ Найдено ошибок типов: $ERROR_COUNT"
          else
            echo "  ✅ MyPy OK"
          fi
        fi
        
        # Pylint - собираем ошибки
        echo "🔍 Pylint - дополнительный анализ (только app/)..."
        PYLINT_ERRORS=0
        if [ -d "app" ]; then
          pylint app --disable=all --enable=E0602,E0603,E1120,E1121 > quality-reports/pylint.txt 2>&1
          PYLINT_EXIT=$?
          if [ $PYLINT_EXIT -ne 0 ]; then
            ERROR_COUNT=$(grep -c "^" quality-reports/pylint.txt || echo "0")
            PYLINT_ERRORS=$ERROR_COUNT
            echo "  ⚠️ Найдено ошибок: $ERROR_COUNT"
          else
            echo "  ✅ Pylint OK"
          fi
        fi
        
        # Создаем сводный отчет
        echo ""
        echo "📊 СВОДНЫЙ ОТЧЕТ ОБ ОШИБКАХ:"
        echo "================================"
        echo "Ruff: $RUFF_TOTAL ошибок в $RUFF_ERRORS директориях"
        echo "Flake8: $FLAKE8_ERRORS критических ошибок"
        echo "MyPy: $MYPY_ERRORS ошибок типов"
        echo "Pylint: $PYLINT_ERRORS ошибок"
        TOTAL=$((RUFF_TOTAL + FLAKE8_ERRORS + MYPY_ERRORS + PYLINT_ERRORS))
        # Legacy Ruff backlog is reported but not release-blocking yet.
        BLOCKING_TOTAL=$FLAKE8_ERRORS
        echo "ВСЕГО: $TOTAL ошибок"
        echo "БЛОКИРУЮЩИХ: $BLOCKING_TOTAL (Flake8 critical)"
        echo "================================"
        
        # Создаем единый файл со всеми ошибками
        echo "📝 Создаем единый отчет со всеми ошибками..."
        {
          echo "# Полный отчет об ошибках линтинга"
          echo "Сгенерировано: $(date)"
          echo ""
          echo "## Сводка"
          echo "- Ruff: $RUFF_TOTAL ошибок"
          echo "- Flake8: $FLAKE8_ERRORS критических ошибок"
          echo "- MyPy: $MYPY_ERRORS ошибок типов"
          echo "- Pylint: $PYLINT_ERRORS ошибок"
          echo "- **ВСЕГО: $TOTAL ошибок**"
          echo "- **БЛОКИРУЮЩИХ: $BLOCKING_TOTAL (Flake8 critical)**"
          echo ""
          
          if [ $RUFF_ERRORS -gt 0 ]; then
            echo "## Ruff ошибки"
            echo ""
            for dir in app tests; do
              if [ -f "quality-reports/ruff_${dir}.txt" ] && [ -s "quality-reports/ruff_${dir}.txt" ]; then
                echo "### $dir/"
                echo "\`\`\`"
                cat quality-reports/ruff_${dir}.txt
                echo "\`\`\`"
                echo ""
              fi
            done
          fi
          
          if [ $FLAKE8_ERRORS -gt 0 ]; then
            echo "## Flake8 критические ошибки"
            echo "\`\`\`"
            cat quality-reports/flake8.txt
            echo "\`\`\`"
            echo ""
          fi
          
          if [ $MYPY_ERRORS -gt 0 ]; then
            echo "## MyPy ошибки типов"
            echo "\`\`\`"
            head -200 quality-reports/mypy.txt
            echo "\`\`\`"
            echo ""
          fi
          
          if [ $PYLINT_ERRORS -gt 0 ]; then
            echo "## Pylint ошибки"
            echo "\`\`\`"
            head -100 quality-reports/pylint.txt
            echo "\`\`\`"
            echo ""
          fi
        } > quality-reports/ALL_ERRORS_REPORT.md
        
        echo "✅ Отчет сохранен в quality-reports/ALL_ERRORS_REPORT.md"
        echo "📦 Все отчеты сохранены в quality-reports/"
        
        # Показываем краткую сводку
        if [ $BLOCKING_TOTAL -gt 0 ]; then
          echo ""
          echo "⚠️ ВНИМАНИЕ: Найдено $TOTAL ошибок (блокирующих: $BLOCKING_TOTAL)!"
          echo "📄 Полный отчет: quality-reports/ALL_ERRORS_REPORT.md"
          echo "💡 Рекомендация: Исправьте все ошибки перед следующим коммитом"
          echo ""
          echo "Для локальной проверки запустите:"
          echo "  cd backend"
          echo "  python scripts/collect_linting_errors.py"
          echo ""
          echo "❌ Блокируем pipeline из-за Flake8 critical ошибок"
          exit 1
        else
          if [ $TOTAL -gt 0 ]; then
            echo "✅ Блокирующие проверки пройдены. Ruff/MyPy/Pylint ошибки сохранены в отчете (не блокируют)."
          else
            echo "✅ Все проверки пройдены успешно!"
          fi
        fi
    
    - name: 📄 Создание документа с ошибками
      if: always()
      run: |
        cd backend
        if [ -f "quality-reports/ALL_ERRORS_REPORT.md" ]; then
          echo "📄 Документ с ошибками создан"
          echo "📊 Размер: $(wc -l < quality-reports/ALL_ERRORS_REPORT.md) строк"
          echo ""
          echo "## 📋 Отчет об ошибках линтинга" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          head -50 quality-reports/ALL_ERRORS_REPORT.md >> $GITHUB_STEP_SUMMARY
          if [ $(wc -l < quality-reports/ALL_ERRORS_REPORT.md) -gt 50 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "... (полный отчет в артефактах)" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "✅ Ошибок не найдено - документ не создан"
        fi
    
    - name: 🔍 Проверка сложности кода
      run: |
        cd backend
        mkdir -p quality-reports
        echo "📊 Анализ сложности кода (Radon)..."
        radon cc app --min B --show-complexity > quality-reports/complexity.txt 2>&1 || true
        radon mi app --min B > quality-reports/maintainability.txt 2>&1 || true
        
        echo "📊 Статистика сложности:"
        head -30 quality-reports/complexity.txt || true
        echo ""
        echo "📊 Индекс поддерживаемости:"
        head -20 quality-reports/maintainability.txt || true
    
    - name: 📝 Проверка документации
      run: |
        cd backend
        mkdir -p quality-reports
        echo "📝 Проверка docstrings (pydocstyle)..."
        pydocstyle app --convention=google --add-ignore=D100,D104 > quality-reports/docstyle.txt 2>&1 || {
          echo "⚠️ Некоторые функции не имеют docstrings (не блокируем):"
          cat quality-reports/docstyle.txt | head -30
        }
    
    - name: 🔍 Поиск проблемных паттернов
      run: |
        cd backend
        mkdir -p quality-reports
        set -e
        
        echo "🔍 Поиск TODO/FIXME/HACK комментариев..."
        grep -r "TODO\|FIXME\|HACK\|XXX" app/ --include="*.py" > quality-reports/todos.txt 2>&1 || echo "✅ Нет TODO/FIXME комментариев"
        if [ -s quality-reports/todos.txt ]; then
          echo "⚠️ Найдены TODO/FIXME комментарии:"
          head -20 quality-reports/todos.txt
        fi
        
        echo "🔍 Поиск мертвого кода (Vulture)..."
        vulture app --min-confidence 80 --exclude app/api/v1/endpoints/ > quality-reports/vulture.txt 2>&1 || {
          echo "⚠️ Vulture нашел потенциально мертвый код (не блокируем):"
          head -30 quality-reports/vulture.txt
        }
        
        echo "🔍 Проверка размера файлов..."
        find app -name "*.py" -type f -exec wc -l {} + | sort -rn | head -20 > quality-reports/large-files.txt || true
        echo "📊 Самые большие файлы:"
        head -10 quality-reports/large-files.txt
        
        # Проверяем файлы больше 1000 строк
        if find app -name "*.py" -type f -exec wc -l {} + | awk '$1 > 1000 {print $2}' | grep -q .; then
          echo "⚠️ Найдены файлы больше 1000 строк:"
          find app -name "*.py" -type f -exec wc -l {} + | awk '$1 > 1000 {print $1, $2}'
        fi
    
    - name: 🔒 Проверка безопасности
      run: |
        cd backend
        mkdir -p quality-reports
        echo "🔒 Bandit - сканирование безопасности..."
        bandit -r app -f json -o quality-reports/bandit.json > quality-reports/bandit.txt 2>&1 || {
          echo "❌ Bandit нашел проблемы безопасности:"
          cat quality-reports/bandit.txt | head -50
          # Показываем только высокий и средний уровень
          if grep -q "Severity: High\|Severity: Medium" quality-reports/bandit.txt; then
            echo "❌ Найдены критические проблемы безопасности"
            exit 1
          fi
        }
        echo "✅ Bandit проверка OK"
    
    - name: 📤 Сохранение отчетов
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: backend/quality-reports/
        retention-days: 7
        if-no-files-found: warn
    
    - name: 📊 Итоговый отчет
      if: always()
      run: |
        cd backend
        echo "## 📊 Итоговый отчет качества кода" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Проверки пройдены:" >> $GITHUB_STEP_SUMMARY
        echo "- Black форматирование" >> $GITHUB_STEP_SUMMARY
        echo "- Isort сортировка импортов" >> $GITHUB_STEP_SUMMARY
        echo "- Ruff линтинг" >> $GITHUB_STEP_SUMMARY
        echo "- Flake8 критические ошибки" >> $GITHUB_STEP_SUMMARY
        echo "- Bandit безопасность" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f quality-reports/todos.txt ] && [ -s quality-reports/todos.txt ]; then
          echo "### ⚠️ Найдены TODO/FIXME:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          head -10 quality-reports/todos.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📦 Отчеты сохранены как артефакты" >> $GITHUB_STEP_SUMMARY

  # --- Frontend тесты ---
  frontend-tests:
    name: 🎨 Frontend тесты
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 📦 Установка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: 📦 Установка зависимостей
      run: |
        cd frontend
        npm ci
    
    - name: 🔍 Линтинг frontend
      run: |
        cd frontend
        if npm run lint:check; then
          echo "✅ Frontend lint passed"
        else
          echo "::warning::Frontend lint has legacy violations and is non-blocking in this phase. Frontend tests/build remain blocking."
        fi
    
    - name: 🧪 Тесты frontend
      run: |
        cd frontend
        npm run test:run -- --coverage
    
    - name: 🏗️ Сборка frontend
      run: |
        cd frontend
        npm run build

  # --- Backend тесты ---
  backend-tests:
    name: 🐍 Backend тесты
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code-quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinicdb
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinicpwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb
      CORS_DISABLE: '1'
      WS_DEV_ALLOW: '1'
      PYTHONIOENCODING: 'utf-8'
      PYTHONUTF8: '1'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Установка зависимостей
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-deadfixtures httpx
    
    - name: 🗄️ Подготовка базы данных
      run: |
        cd backend
        echo "⏳ Ожидаем готовность Postgres..."
        python - <<'PY'
        import os
        import time
        from sqlalchemy import create_engine, text

        url = os.environ["DATABASE_URL"]
        engine = create_engine(url)
        for i in range(30):
            try:
                with engine.connect() as conn:
                    conn.execute(text("SELECT 1"))
                print("✅ Postgres ready")
                break
            except Exception as e:
                if i == 29:
                    raise
                print(f"Attempt {i + 1}/30: {e}")
                time.sleep(2)
        PY
        alembic upgrade head
        alembic current
    
    - name: 🧪 Запуск тестов
      run: |
        cd backend
        echo "🔍 Проверяем конфигурацию pytest:"
        cat pytest.ini
        echo "🧪 Запускаем тесты с покрытием:"
        pytest tests/
        echo "📁 Проверяем созданные файлы:"
        ls -la htmlcov/ || echo "Папка htmlcov не найдена"
        if [ ! -d "htmlcov" ]; then
          echo "📊 Создаем папку htmlcov для артефактов"
          mkdir -p htmlcov
          echo "Placeholder coverage report - tests completed successfully" > htmlcov/index.html
        fi

    - name: 🧪 Critical E2E Smoke
      run: |
        cd backend
        echo "🔬 Запускаем критичные E2E сценарии (queue/payment/rbac/emr/print)..."
        pytest -q \
          tests/integration/test_queue_time_websocket_e2e.py \
          tests/integration/test_payment_init_e2e.py \
          tests/integration/test_rbac_matrix.py \
          tests/integration/test_e2e_doctor_visit.py::TestDoctorVisitFlow::test_doctor_can_fill_emr \
          tests/integration/test_e2e_doctor_visit.py::TestDoctorVisitFlow::test_doctor_can_generate_prescription_pdf
    
    - name: 📊 Загрузка отчета покрытия
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: backend/htmlcov/
        if-no-files-found: warn

  # --- Архитектурные boundary тесты ---
  architecture-boundary:
    name: 🧱 Context Boundary Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: 🐍 Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Установка зависимостей
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: 🧱 Run context boundary tests
      run: |
        cd backend
        START_TS=$(date +%s)
        CONTEXTS=$(python - <<'PY'
        from app.domain.context_registry import DomainContext
        print(len(DomainContext))
        PY
        )

        set +e
        pytest -q tests/architecture/test_context_boundaries.py | tee /tmp/context-boundary.log
        TEST_EXIT=${PIPESTATUS[0]}
        set -e

        END_TS=$(date +%s)
        DURATION=$((END_TS - START_TS))
        VIOLATIONS=$(grep -c " -> " /tmp/context-boundary.log || true)

        echo "contexts checked: ${CONTEXTS}"
        echo "violations: ${VIOLATIONS}"
        echo "duration_seconds: ${DURATION}"

        {
          echo "## 🧱 Context Boundary Check"
          echo "- contexts checked: ${CONTEXTS}"
          echo "- violations: ${VIOLATIONS}"
          echo "- duration: ${DURATION}s"
        } >> "$GITHUB_STEP_SUMMARY"

        exit $TEST_EXIT

  # --- Security сканирование ---
  security:
    name: 🔒 Security сканирование
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [code-quality, frontend-tests, backend-tests, architecture-boundary]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Установка зависимостей
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit semgrep
    
    - name: 🔒 Проверка уязвимостей
      run: |
        cd backend
        # Safety для проверки уязвимостей в зависимостях
        safety check --json
        # Bandit для анализа безопасности кода
        bandit -r app -f json
        # Semgrep для статического анализа безопасности
        semgrep --config=auto app/

  # --- Docker сборка ---
  docker:
    name: 🐳 Docker сборка
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [code-quality, frontend-tests, backend-tests, architecture-boundary]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐳 Настройка Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🔍 Проверка Dockerfile'ов
      run: |
        echo "🔍 Проверяем наличие Dockerfile'ов..."
        ls -la ops/
        if [ ! -f "ops/backend.Dockerfile" ]; then
          echo "❌ Backend Dockerfile не найден"
          exit 1
        fi
        if [ ! -f "ops/frontend.Dockerfile" ]; then
          echo "❌ Frontend Dockerfile не найден"
          exit 1
        fi
        echo "✅ Все Dockerfile'ы найдены"
    
    - name: 🏗️ Сборка Backend Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/backend.Dockerfile
        push: false
        tags: clinic-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
    
    - name: 🏗️ Сборка Frontend Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/frontend.Dockerfile
        push: false
        tags: clinic-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1

  # --- Интеграционные тесты ---
  integration:
    name: 🔗 Интеграционные тесты
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-tests, frontend-tests, architecture-boundary]
    if: always() && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinicdb
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinicpwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb
      CORS_DISABLE: '1'
      WS_DEV_ALLOW: '1'
      PYTHONIOENCODING: 'utf-8'
      PYTHONUTF8: '1'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🐍 Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Установка зависимостей
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
        # Test dependencies
        pip install pytest pytest-asyncio httpx requests
        echo "✅ Все зависимости установлены"
        echo "🔍 Проверяем установленные пакеты:"
        pip list | grep -E "(fastapi|uvicorn|requests|httpx)" || true
    
    - name: 🗄️ Подготовка тестовой базы
      run: |
        cd backend
        echo "⏳ Ожидаем готовность Postgres..."
        python - <<'PY'
        import os
        import time
        from sqlalchemy import create_engine, text

        url = os.environ["DATABASE_URL"]
        engine = create_engine(url)
        for i in range(30):
            try:
                with engine.connect() as conn:
                    conn.execute(text("SELECT 1"))
                print("✅ Postgres ready")
                break
            except Exception as e:
                if i == 29:
                    raise
                print(f"Attempt {i + 1}/30: {e}")
                time.sleep(2)
        PY
        alembic upgrade head
        alembic current
    
    - name: 🚀 Запуск сервера
      run: |
        set -e
        cd backend
        export DATABASE_URL="${DATABASE_URL}"
        export CORS_DISABLE="1"
        export WS_DEV_ALLOW="1"
        export PYTHONPATH="$GITHUB_WORKSPACE/backend:$PYTHONPATH"
        
        echo "🔍 Проверяем что приложение может импортироваться..."
        echo "Step 1: Testing critical imports before app.main..."
        echo "  - Testing app.core.exception_handlers..."
        python -c "
        import os
        import sys
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        print('Debug: Python version:', sys.version[:5])
        print('Debug: Current dir:', os.getcwd())
        try:
            from app.core.exception_handlers import register_exception_handlers
            print('✅ exception_handlers OK')
        except Exception as e:
            print('❌ exception_handlers failed:', e)
            import traceback
            traceback.print_exc()
        " 2>&1 || echo "⚠️ exception_handlers import failed"
        
        echo "  - Testing app.ws.queue_ws..."
        python -c "
        import os
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        from app.ws.queue_ws import router, ws_queue
        print('✅ queue_ws OK')
        " 2>&1 || echo "⚠️ queue_ws import failed"
        
        echo "  - Testing app.api.deps..."
        python -c "
        import os
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        from app.api.deps import create_access_token
        print('✅ deps OK')
        " 2>&1 || echo "⚠️ deps import failed (will use fallback)"
        
        echo "  - Testing app.api.v1.api..."
        if ! python -c "
        import os
        import sys
        import traceback
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        print('Debug: Testing api.v1.api import...')
        try:
            from app.api.v1.api import api_router
            print('✅ api.v1.api OK')
        except Exception as e:
            print(f'❌ api.v1.api FAILED: {e}')
            print('Full traceback:')
            traceback.print_exc()
            print('sys.path first 3:', sys.path[:3])
            sys.exit(1)
        " 2>&1; then
          echo "❌ Failed to import app.api.v1.api - checking which endpoint module fails..."
          python -c "
          import os
          import sys
          os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
          os.environ['CORS_DISABLE'] = '1'
          os.environ['WS_DEV_ALLOW'] = '1'
          modules_to_test = [
              'app.api.v1.endpoints.auth',
              'app.api.v1.endpoints.patients',
              'app.api.v1.endpoints.visits',
              'app.api.v1.endpoints.services',
              'app.api.v1.endpoints.appointments',
          ]
          failed_modules = []
          for module in modules_to_test:
              try:
                  __import__(module)
                  print(f'✅ {module} OK')
              except Exception as e:
                  print(f'❌ {module} FAILED: {e}')
                  import traceback
                  traceback.print_exc()
                  failed_modules.append(module)
          if failed_modules:
              print(f'❌ Failed modules: {failed_modules}')
              sys.exit(1)
          " 2>&1 || exit 1
        fi
        
        echo "Step 2: Importing app.main module..."
        if ! python -c "
        import os
        import sys
        import traceback
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        print('Debug: Testing app.main import...')
        try:
            import app.main
            print('✅ app.main module imported')
        except Exception as e:
            print(f'❌ Failed to import app.main: {e}')
            print('Full traceback:')
            traceback.print_exc()
            sys.exit(1)
        " 2>&1; then
          echo "❌ Не удалось импортировать app.main"
          exit 1
        fi

        echo "Step 3: Importing app from app.main..."
        if ! python -c "
        import os
        import sys
        import traceback
        os.environ['DATABASE_URL'] = 'postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb'
        os.environ['CORS_DISABLE'] = '1'
        os.environ['WS_DEV_ALLOW'] = '1'
        print('Debug: Testing app from app.main import...')
        try:
            from app.main import app
            print('✅ App импортирован успешно')
        except Exception as e:
            print(f'❌ Failed to import app from app.main: {e}')
            print('Full traceback:')
            traceback.print_exc()
            sys.exit(1)
        " 2>&1; then
          echo "❌ Не удалось импортировать app из app.main"
          exit 1
        fi
        
        echo "✅ Все импорты успешны"
        echo "🚀 Запускаем сервер..."
        nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
        SERVER_PID=$!
        echo $SERVER_PID > server.pid
        echo "⏳ Ожидаем запуска сервера (PID: $SERVER_PID)..."
        sleep 15
        
        # Проверяем, что процесс еще работает
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "❌ Сервер не запустился (процесс завершился)"
          echo "📋 Логи сервера:"
          cat server.log || echo "Логи не доступны"
          exit 1
        fi
        
        echo "📋 Логи сервера после запуска:"
        head -50 server.log || echo "Логи не доступны"
        echo "🔍 Проверяем статус процесса:"
        ps aux | grep uvicorn | grep -v grep || echo "Процесс не найден"
        if [ -f server.pid ]; then
          echo "📝 PID файл существует: $(cat server.pid)"
        else
          echo "⚠️ PID файл не найден"
        fi
        
        # Проверяем доступность сервера
        echo "🔍 Проверяем доступность сервера..."
        for i in {1..5}; do
          if curl -f http://127.0.0.1:8000/api/v1/health > /dev/null 2>&1; then
            echo "✅ Сервер успешно запущен и отвечает на запросы"
            break
          else
            if [ $i -eq 5 ]; then
              echo "❌ Сервер не отвечает после 5 попыток"
              echo "📋 Последние 100 строк логов:"
              tail -100 server.log || echo "Логи не доступны"
              exit 1
            fi
            echo "⏳ Попытка $i/5: сервер еще не готов..."
            sleep 3
          fi
        done
    
    - name: 🧪 Интеграционные тесты
      run: |
        cd backend
        # Ждем запуска сервера
        echo "⏳ Ожидаем запуска сервера..."
        SERVER_READY=false
        for i in {1..30}; do
          if curl -s -f "http://127.0.0.1:8000/api/v1/health" > /dev/null 2>&1; then
            echo "✅ Сервер запущен и отвечает на запросы"
            SERVER_READY=true
            break
          fi
          echo "⏳ Попытка $i/30: сервер еще не готов..."
          if [ $i -eq 30 ]; then
            echo "❌ Сервер не запустился за 60 секунд"
            echo "📋 Последние 100 строк логов сервера:"
            tail -100 server.log || echo "Логи не доступны"
            echo "🔍 Проверяем процессы:"
            ps aux | grep uvicorn || echo "Процесс uvicorn не найден"
            if [ -f server.pid ]; then
              echo "📝 PID файл: $(cat server.pid)"
            fi
            exit 1
          fi
          sleep 2
        done
        
        if [ "$SERVER_READY" = false ]; then
          echo "❌ Сервер не готов к тестированию"
          exit 1
        fi
        
        # Запускаем интеграционные тесты для запущенного сервера
        echo "🧪 Запускаем интеграционные тесты..."
        pytest -q tests/integration/test_server_integration.py -rA || {
          echo "⚠️ Некоторые интеграционные тесты не прошли"
          echo "📊 Логи сервера (последние 100 строк):"
          tail -100 server.log || true
          exit 1
        }
    
    - name: 🛑 Остановка сервера
      if: always()
      run: |
        if [ -f backend/server.pid ]; then
          kill $(cat backend/server.pid) 2>/dev/null || true
        fi

  # --- Load Tests (Nightly/Manual) ---
  load-tests-nightly:
    name: ⚡ Load Tests (k6)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [security, integration]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinicdb
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinicpwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb
      CORS_DISABLE: '1'
      WS_DEV_ALLOW: '1'
      TARGET_RPS: '30'
      PYTHONIOENCODING: 'utf-8'
      PYTHONUTF8: '1'

    steps:
    - uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Install backend dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🗄️ Prepare database
      run: |
        cd backend
        python - <<'PY'
        import os
        import time
        from sqlalchemy import create_engine, text

        engine = create_engine(os.environ["DATABASE_URL"])
        for i in range(30):
            try:
                with engine.connect() as conn:
                    conn.execute(text("SELECT 1"))
                print("✅ Postgres ready")
                break
            except Exception as e:
                if i == 29:
                    raise
                print(f"Attempt {i + 1}/30: {e}")
                time.sleep(2)
        PY
        alembic upgrade head

    - name: 🚀 Start API for load test
      run: |
        set +e
        mkdir -p artifacts/load
        cd backend
        nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > load_server.log 2>&1 &
        echo $! > load_server.pid
        API_READY=0
        for i in {1..30}; do
          if curl -s -f "http://127.0.0.1:8000/api/v1/health" > /dev/null 2>&1; then
            echo "✅ API ready for load test"
            API_READY=1
            break
          fi
          sleep 2
        done
        echo "LOAD_API_READY=$API_READY" >> $GITHUB_ENV
        if [ "$API_READY" -ne 1 ]; then
          echo "::warning::API did not start for load test. k6 step will be marked as failed with fallback artifacts."
          tail -100 load_server.log || true
        fi
        exit 0

    - name: ⚡ Run k6 baseline scenario
      run: |
        set +e
        mkdir -p artifacts/load
        chmod -R a+rwx artifacts/load || true
        if [ "${LOAD_API_READY:-0}" -ne 1 ]; then
          echo "::warning::Skipping k6 execution because API was not ready."
          K6_EXIT=1
        else
          docker run --rm --network=host \
            --user "$(id -u):$(id -g)" \
            -e BASE_URL=http://127.0.0.1:8000 \
            -e TARGET_RPS=${TARGET_RPS} \
            -v ${{ github.workspace }}/ops/load:/scripts \
            -v ${{ github.workspace }}/artifacts/load:/artifacts \
            grafana/k6:latest \
            run /scripts/clinic_core.js \
            --summary-export=/artifacts/k6-summary.json
          K6_EXIT=$?
        fi
        echo "K6_EXIT_CODE=$K6_EXIT" >> $GITHUB_ENV
        if [ ! -f artifacts/load/k6-summary.json ]; then
          echo "::warning::k6 summary was not generated; writing fallback summary."
          cat > artifacts/load/k6-summary.json <<'JSON'
        {"error":"k6 summary was not generated","metrics":{}}
        JSON
          echo "K6_SUMMARY_MISSING=1" >> $GITHUB_ENV
        else
          echo "K6_SUMMARY_MISSING=0" >> $GITHUB_ENV
        fi
        exit 0

    - name: 🚦 Check load regression
      run: |
        set +e
        python ops/scripts/check_load_regression.py \
          --summary artifacts/load/k6-summary.json \
          --baseline ops/load/baseline_targets.json \
          --report artifacts/load/load-regression-report.md
        REG_EXIT=$?
        echo "LOAD_REGRESSION_EXIT_CODE=$REG_EXIT" >> $GITHUB_ENV
        if [ $REG_EXIT -ne 0 ] && [ ! -f artifacts/load/load-regression-report.md ]; then
          cat > artifacts/load/load-regression-report.md <<'MD'
        # Load Test Regression Report

        - Status: FAIL
        - Reason: Regression check did not produce a report.
        MD
        fi
        exit 0

    - name: 📤 Upload load artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: load-test-report
        path: |
          artifacts/load/k6-summary.json
          artifacts/load/load-regression-report.md
        if-no-files-found: warn

    - name: 🛑 Stop API
      if: always()
      run: |
        if [ -f backend/load_server.pid ]; then
          kill $(cat backend/load_server.pid) 2>/dev/null || true
        fi

    - name: 🚨 Enforce load gate
      run: |
        K6_EXIT=${K6_EXIT_CODE:-1}
        REG_EXIT=${LOAD_REGRESSION_EXIT_CODE:-1}
        SUMMARY_MISSING=${K6_SUMMARY_MISSING:-1}

        if [ ! -f artifacts/load/load-regression-report.md ]; then
          cat > artifacts/load/load-regression-report.md <<'MD'
        # Load Test Regression Report

        - Status: FAIL
        - Reason: load-regression-report.md missing after checks.
        MD
          REG_EXIT=1
        fi

        echo "k6_exit=$K6_EXIT, regression_exit=$REG_EXIT, summary_missing=$SUMMARY_MISSING"
        if [ "$K6_EXIT" -ne 0 ] || [ "$REG_EXIT" -ne 0 ] || [ "$SUMMARY_MISSING" -ne 0 ]; then
          echo "::error::Load gate failed."
          exit 1
        fi

  # --- DAST (Nightly) ---
  dast-zap-nightly:
    name: 🛡️ DAST ZAP (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clinicdb
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinicpwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://clinic:clinicpwd@localhost:5432/clinicdb
      CORS_DISABLE: '1'
      WS_DEV_ALLOW: '1'

    steps:
    - uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: 📦 Install backend dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🗄️ Prepare database
      run: |
        cd backend
        python - <<'PY'
        import os
        import time
        from sqlalchemy import create_engine, text

        engine = create_engine(os.environ["DATABASE_URL"])
        for i in range(30):
            try:
                with engine.connect() as conn:
                    conn.execute(text("SELECT 1"))
                print("✅ Postgres ready")
                break
            except Exception as e:
                if i == 29:
                    raise
                print(f"Attempt {i + 1}/30: {e}")
                time.sleep(2)
        PY
        alembic upgrade head

    - name: 🚀 Start API for DAST
      run: |
        cd backend
        nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > zap_server.log 2>&1 &
        echo $! > zap_server.pid
        for i in {1..30}; do
          if curl -s -f "http://127.0.0.1:8000/api/v1/health" > /dev/null 2>&1; then
            echo "✅ API is ready for ZAP scan"
            exit 0
          fi
          sleep 2
        done
        echo "❌ API did not start"
        tail -100 zap_server.log || true
        exit 1

    - name: 🔎 Run ZAP baseline scan
      run: |
        mkdir -p zap-report
        chmod -R a+rwx zap-report || true
        docker run --rm --network=host \
          --user root \
          -v ${{ github.workspace }}/zap-report:/zap/wrk \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t http://127.0.0.1:8000 \
          -J /zap/wrk/zap-report.json \
          -r /zap/wrk/zap-report.html \
          -w /zap/wrk/zap-warnings.md \
          -m 5 \
          -I

    - name: 🚦 Enforce DAST policy
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("zap-report/zap-report.json").read_text(encoding="utf-8"))
        high = 0
        medium = 0

        for site in report.get("site", []):
          for alert in site.get("alerts", []):
            risk = str(alert.get("riskcode", "0"))
            if risk == "3":
              high += 1
            elif risk == "2":
              medium += 1

        print(f"ZAP alerts: high={high}, medium={medium}")
        if high > 0 or medium > 0:
          raise SystemExit(1)
        PY

    - name: 📤 Upload ZAP artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zap-nightly-report
        path: zap-report/
        if-no-files-found: warn

    - name: 🛑 Stop API
      if: always()
      run: |
        if [ -f backend/zap_server.pid ]; then
          kill $(cat backend/zap_server.pid) 2>/dev/null || true
        fi

