name: 🔑 Gitleaks Secret Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '30 3 * * *'  # Daily 03:30 UTC — between security-scan and dependabot
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write  # Required for upload-sarif action

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: 🔑 Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for baseline diffing

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set GITLEAKS_LICENSE for org-wide config / private repos.
          # For a public repo the action runs in free mode.
        with:
          scan-mode: repo  # Scan full repo history (catches retroactively committed secrets)

      - name: Upload gitleaks SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          # gitleaks-action writes to results.sarif in the workspace root
          sarif_file: results.sarif
          category: gitleaks
