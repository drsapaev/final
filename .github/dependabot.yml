version: 2
updates:
  # Python зависимости (backend)
  # P-009 cleanup: groups minor/patch into one PR, limits to 5 open PRs,
  # ignores major versions for critical packages that need manual testing.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "drsapaev"
    assignees:
      - "drsapaev"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major versions: manual review required (breaking changes likely)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # protobuf 5→7 is a breaking migration; skip until explicitly planned
      - dependency-name: "protobuf"
        update-types: ["version-update:semver-major"]
      # redis 5→9 is a major rewrite; skip until explicitly planned
      - dependency-name: "redis"
        update-types: ["version-update:semver-major"]

  # Root npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:00"
    open-pull-requests-limit: 2
    reviewers:
      - "drsapaev"
    assignees:
      - "drsapaev"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "root"
    groups:
      root-npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Storybook 8→10 is a major migration requiring all @storybook/* packages
      # to be updated together. Dependabot bumped @storybook/react-vite to v10
      # while @storybook/addon-essentials stayed at v8, breaking npm ci.
      - dependency-name: "@storybook/react-vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "storybook"
        update-types: ["version-update:semver-major"]
      # Vite 6→8 major requires plugin-react 6+ and can break build config
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # Vitest 3→4 major changes test runner API
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/coverage-v8"
        update-types: ["version-update:semver-major"]

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "13:00"
    open-pull-requests-limit: 2
    reviewers:
      - "drsapaev"
    assignees:
      - "drsapaev"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    groups:
      frontend-npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Storybook 8→10 is a major migration requiring all @storybook/* packages
      # to be updated together. Dependabot bumped @storybook/react-vite to v10
      # while @storybook/addon-essentials stayed at v8, breaking npm ci.
      - dependency-name: "@storybook/react-vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "storybook"
        update-types: ["version-update:semver-major"]
      # Vite 6→8 major requires plugin-react 6+ and can break build config
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # Vitest 3→4 major changes test runner API
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/coverage-v8"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 2
    reviewers:
      - "drsapaev"
    assignees:
      - "drsapaev"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker images (ops/)
  # P-009 cleanup: kept but limit lowered to 1 — Docker base image bumps
  # should be manual (require rebuild + integration testing)
  - package-ecosystem: "docker"
    directory: "/ops"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "11:00"
    open-pull-requests-limit: 1
    reviewers:
      - "drsapaev"
    assignees:
      - "drsapaev"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
